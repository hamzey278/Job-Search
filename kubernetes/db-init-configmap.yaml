apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-configmap
  namespace: job-portal
data:
  init-db.sql: |
    -- Enable uuid-ossp extension for UUID generation
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- Function to automatically update the updated_at column
    CREATE OR REPLACE FUNCTION update_updated_at_column()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = CURRENT_TIMESTAMP;
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    -- 1. USERS TABLE
    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        full_name VARCHAR(255) NOT NULL,
        email VARCHAR(255) NOT NULL UNIQUE,
        password_hash VARCHAR(255) NOT NULL,
        role VARCHAR(50) NOT NULL DEFAULT 'Candidate' CHECK (role IN ('Candidate', 'Recruiter', 'Admin')),
        failed_login_attempts INTEGER NOT NULL DEFAULT 0,
        account_locked_until TIMESTAMP WITH TIME ZONE,
        is_active BOOLEAN NOT NULL DEFAULT TRUE,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TRIGGER update_users_updated_at
        BEFORE UPDATE ON users
        FOR EACH ROW
        EXECUTE FUNCTION update_updated_at_column();

    -- Create index on email for fast user lookup
    CREATE INDEX IF NOT EXISTS idx_users_email ON users(email);

    -- 2. JOBS TABLE
    CREATE TABLE IF NOT EXISTS jobs (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        title VARCHAR(255) NOT NULL,
        description TEXT NOT NULL,
        location VARCHAR(255) NOT NULL,
        employment_type VARCHAR(100) NOT NULL CHECK (employment_type IN ('Full-time', 'Part-time', 'Contract', 'Remote', 'Internship')),
        salary_range VARCHAR(100),
        status VARCHAR(50) NOT NULL DEFAULT 'Open' CHECK (status IN ('Open', 'Closed')),
        created_by UUID REFERENCES users(id) ON DELETE SET NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TRIGGER update_jobs_updated_at
        BEFORE UPDATE ON jobs
        FOR EACH ROW
        EXECUTE FUNCTION update_updated_at_column();

    -- Create indexes on jobs for searching/filtering
    CREATE INDEX IF NOT EXISTS idx_jobs_status ON jobs(status);
    CREATE INDEX IF NOT EXISTS idx_jobs_created_by ON jobs(created_by);

    -- 3. APPLICATIONS TABLE
    CREATE TABLE IF NOT EXISTS applications (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        job_id UUID REFERENCES jobs(id) ON DELETE CASCADE,
        candidate_id UUID REFERENCES users(id) ON DELETE CASCADE,
        resume_url VARCHAR(512) NOT NULL,
        cover_letter TEXT,
        status VARCHAR(50) NOT NULL DEFAULT 'Applied' CHECK (status IN ('Applied', 'Interviewing', 'Offered', 'Rejected')),
        applied_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Unique constraint to prevent duplicate applications for the same job by same candidate
    CREATE UNIQUE INDEX IF NOT EXISTS idx_unique_job_candidate ON applications(job_id, candidate_id);

    -- 4. RESUMES TABLE
    CREATE TABLE IF NOT EXISTS resumes (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID REFERENCES users(id) ON DELETE CASCADE,
        file_name VARCHAR(255) NOT NULL,
        file_url VARCHAR(512) NOT NULL,
        uploaded_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- 5. AUDIT LOGS TABLE
    CREATE TABLE IF NOT EXISTS audit_logs (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID REFERENCES users(id) ON DELETE SET NULL,
        action VARCHAR(100) NOT NULL,
        resource VARCHAR(100) NOT NULL,
        ip_address VARCHAR(45),
        timestamp TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS idx_audit_logs_timestamp ON audit_logs(timestamp DESC);

    -- SEED DATA
    -- Default Admin password: AdminPassword123!
    -- Default Recruiter password: RecruiterPassword123!
    -- Default Candidate password: CandidatePassword123!
    -- Hashed using bcrypt (10 rounds)
    INSERT INTO users (id, full_name, email, password_hash, role) VALUES
    ('a0e0a9bc-993d-4c3d-9d45-66738b556b10', 'System Admin', 'admin@jobportal.com', '$2b$10$r819WepMvR11rGq62qZ47ee4pY2n41BScv3kF6lK8G164o30hBOCG', 'Admin'),
    ('b0e0a9bc-993d-4c3d-9d45-66738b556b11', 'Jane Recruiter', 'recruiter@jobportal.com', '$2b$10$oX3yv4k9J2N5W/J.y8h/tOn9rD.E5e.Llz777b7g.B7f7b7k.D7f7', 'Recruiter'),
    ('c0e0a9bc-993d-4c3d-9d45-66738b556b12', 'John Candidate', 'candidate@jobportal.com', '$2b$10$mKuxz7C7/rU2O7b.7t/zFe5q1qY.r6E.C5b7z7e.B7d7b7k.D7f7', 'Candidate')
    ON CONFLICT (email) DO NOTHING;
