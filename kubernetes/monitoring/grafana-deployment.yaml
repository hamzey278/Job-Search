apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: job-portal
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.1
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_AUTH_ANONYMOUS_ORG_NAME
              value: "Main Org."
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: grafana-prov-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: grafana-prov-dashboards
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: grafana-dashboards-json
              mountPath: /var/lib/grafana/dashboards/job_portal_dashboard.json
              subPath: job_portal_dashboard.json
      volumes:
        - name: grafana-prov-datasources
          configMap:
            name: grafana-provisioning-config
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: grafana-prov-dashboards
          configMap:
            name: grafana-provisioning-config
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: grafana-dashboards-json
          configMap:
            name: grafana-provisioning-config
            items:
              - key: job_portal_dashboard.json
                path: job_portal_dashboard.json
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: job-portal
  labels:
    app: grafana
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana
  type: ClusterIP
