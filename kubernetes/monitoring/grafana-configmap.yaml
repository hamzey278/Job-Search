apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-config
  namespace: job-portal
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'Job Portal Core Dashboards'
        orgId: 1
        folder: 'Operations'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

  job_portal_dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "title": "System Resource Utilization",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "title": "Host CPU Utilization",
          "type": "gauge",
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU Usage (%)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 100,
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 70, "color": "orange" },
                  { "value": 85, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Host Memory Utilization",
          "type": "gauge",
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 12,
            "y": 1
          },
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "Memory Usage (%)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 100,
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 75, "color": "orange" },
                  { "value": 85, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Application Traffic & Security Logs",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 8
          }
        },
        {
          "id": 5,
          "title": "Total HTTP Requests",
          "type": "stat",
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 0,
            "y": 9
          },
          "targets": [
            {
              "expr": "sum(job_portal_http_requests_total)",
              "legendFormat": "Total Requests",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "blue" }
                ]
              }
            }
          }
        },
        {
          "id": 6,
          "title": "Failed Login Attempts (Brute Force Tracker)",
          "type": "stat",
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 8,
            "y": 9
          },
          "targets": [
            {
              "expr": "sum(job_portal_login_failures_total)",
              "legendFormat": "Failed Logins",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 1, "color": "yellow" },
                  { "value": 10, "color": "orange" },
                  { "value": 20, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 7,
          "title": "Submitted Job Applications",
          "type": "stat",
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 9
          },
          "targets": [
            {
              "expr": "sum(job_portal_applications_submitted_total)",
              "legendFormat": "Applications",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "purple" }
                ]
              }
            }
          }
        }
      ],
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["monitoring", "security", "production"],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "title": "Secure Job Portal Core Platform Dashboard",
      "version": 1
    }
