name: Secure Job Portal CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. INTEGRATION & VERIFICATION STAGE
  test-and-scan:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package.json
            frontend/package.json

      # Backend Checks
      - name: Install Backend Modules
        working-directory: ./backend
        run: npm ci

      - name: Backend Security Audit Scan
        working-directory: ./backend
        run: npm audit --audit-level=high

      # Frontend Checks
      - name: Install Frontend Modules
        working-directory: ./frontend
        run: npm ci

      - name: Frontend Linters
        working-directory: ./frontend
        run: npm run lint --if-present

  # 2. CONTINUOUS DEPLOYMENT STAGE (Main branch only)
  build-and-deploy:
   name: Deploy to Azure App Service
   needs: test-and-scan
   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
   runs-on: ubuntu-latest

  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Zip Backend Application
      run: |
        zip -r backend.zip backend

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: jobsearch-app
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: backend.zip